# ds-cli default configuration
# Do NOT edit this file — create ~/.ds-cli/config.yaml to override.

# Default model profile (used when --pro is not specified)
default_model: deepseek-v4-flash

# Pro model profile (used when --pro is specified)
pro_model: deepseek-v4-pro[1m]

# System prompt appended to every claude invocation
system_prompt: |
  重要：你收到的是一个完整需求，必须直接执行到底。禁止以下行为：
  1. 不要分析完问题后问用户"要开始改吗？""倾向于哪个方案？"等确认
  2. 不要提出多个方案让用户选择
  3. 不要输出分析报告后停下来等指示
  你需要：理解需求 → 直接修改代码 → 输出结果。需求模糊时按最合理的默认方式执行，不要问。

# Template shared by all backends.
# Backends inherit these fields and can override specific keys.
backend_template:
  env:
    ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
    ANTHROPIC_MODEL: "{model}"
    CLAUDE_CONFIG_DIR: "{home}/.claude2"
    ANTHROPIC_DEFAULT_OPUS_MODEL: "{pro_model}"
    ANTHROPIC_DEFAULT_SONNET_MODEL: "{default_model}"
    ANTHROPIC_DEFAULT_HAIKU_MODEL: "deepseek-v4-flash"
    CLAUDE_CODE_SUBAGENT_MODEL: "{default_model}"
  claude_command: "claude"
  pty:
    - "script"
    - "-q"
    - "/dev/null"
  session_flags:
    - "-p"
    - "{prompt}"
    - "--dangerously-skip-permissions"
    - "--append-system-prompt"
    - "{system_prompt}"
    - "--output-format"
    - "stream-json"
    - "--verbose"
    - "--include-partial-messages"
  session_id_flags:
    - "--session-id"
    - "{session_id}"
  resume_flags:
    - "--resume"
    - "{session_id}"
    - "--dangerously-skip-permissions"
