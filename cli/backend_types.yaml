# handoff backend types — this file defines HOW each backend type is launched.
# It is part of the program's behaviour and CANNOT be overridden by user config.
# To understand the complete configuration model, start here.
#
# Types:
#   claude   — PTY-wrapped `claude -p --output-format stream-json` against any
#              Anthropic-compatible endpoint.
#   codex    — `codex exec --json` against the local codex login state.
#   opencode — `opencode run --format json` against the local opencode login
#              state (free Zen models included — no API key needed).
#
# Each type defines the CLI command, PTY wrapper, and flag templates.
# Placeholders ({model}, {prompt}, {session_id}, {system_prompt}, {cwd}, {home})
# are substituted at runtime.
#
# User-owned configuration (backends, env, models) lives in ~/.handoff/config.yaml
# (generated by `handoff init`). Run `handoff env` to locate both files.

# System prompt appended to every claude invocation (claude-type backends only).
# This is the one built-in value users CAN override — set `system_prompt:` in
# ~/.handoff/config.yaml to replace it.
system_prompt: |
  重要：你收到的是一个完整需求，必须直接执行到底。禁止以下行为：
  1. 不要分析完问题后问用户"要开始改吗？""倾向于哪个方案？"等确认
  2. 不要提出多个方案让用户选择
  3. 不要输出分析报告后停下来等指示
  你需要：理解需求 → 直接修改代码 → 输出结果。需求模糊时按最合理的默认方式执行，不要问。

types:
  # ── claude type: PTY-wrapped `claude -p --output-format stream-json` ─────────
  claude:
    command: "claude"
    pty:
      - "script"
      - "-q"
      - "/dev/null"
    session_flags:
      - "-p"
      - "{prompt}"
      - "--dangerously-skip-permissions"
      - "--append-system-prompt"
      - "{system_prompt}"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--include-partial-messages"
    session_id_flags:
      - "--session-id"
      - "{session_id}"
    # Used by `resume <seq> <prompt>` (non-interactive continuation): append a new
    # turn to an existing claude session in print mode. Combined with session_flags
    # (which carry -p/{prompt}/stream-json/etc.) this becomes `claude -p ... --resume <id>`.
    continue_id_flags:
      - "--resume"
      - "{session_id}"
    resume_flags:
      - "--resume"
      - "{session_id}"
      - "--dangerously-skip-permissions"

  # ── codex type: `codex exec --json` against local codex login ─────────────────
  codex:
    command: "codex"
    pty: []
    # Fresh run: codex exec --json <flags> {prompt}
    session_flags:
      - "exec"
      - "--json"
      - "--skip-git-repo-check"
      - "--sandbox"
      - "workspace-write"
      - "-m"
      - "{model}"
      - "-C"
      - "{cwd}"
      - "{prompt}"
    # codex has no separate "set session id" mode for a fresh run; the id is
    # assigned by codex and reported in the thread.started event.
    session_id_flags: []
    # Non-interactive continuation: codex exec resume --json <session_id> {prompt}.
    # NOTE: `codex exec resume` does not accept --sandbox/-C; it inherits the
    # original session's settings, so this list deliberately omits them.
    continue_id_flags:
      - "exec"
      - "resume"
      - "--json"
      - "--skip-git-repo-check"
      - "{session_id}"
      - "{prompt}"
    # Interactive reopen: `codex resume <session_id>`.
    resume_flags:
      - "resume"
      - "{session_id}"

  # ── opencode type: `opencode run --format json` against local opencode login ──
  #
  # --agent handoff-safe: hardcoded, not a user-configurable placeholder.
  # opencode runs here with --auto (all tool calls auto-approved, no human
  # watching) — the same unattended shape as claude's
  # --dangerously-skip-permissions and codex's --sandbox workspace-write.
  # Unlike those two, opencode may carry its own MCP servers wired up for
  # live infrastructure (Supabase, Firebase, ...) via the project's own
  # opencode.json / the user's global opencode config — a background run
  # has no business touching those unsupervised. `handoff-safe` is a global
  # opencode agent (~/.config/opencode/agents/handoff-safe.md) that denies
  # supabase_*/firebase_* tools while keeping everything else the default
  # `build` agent has; interactive `opencode` use (TUI, or `opencode run`
  # without --agent) is completely unaffected and keeps full MCP access.
  # Requires that agent to exist — `handoff run --backend opencode` will
  # error out with "unknown agent" if it doesn't; create it once per machine.
  opencode:
    command: "opencode"
    pty: []
    # Fresh run: opencode run --model <model> --format json --auto --dir <cwd> <prompt>
    session_flags:
      - "run"
      - "--model"
      - "{model}"
      - "--agent"
      - "handoff-safe"
      - "--format"
      - "json"
      - "--auto"
      - "--dir"
      - "{cwd}"
      - "{prompt}"
    # opencode has no separate "set session id" mode for a fresh run; the id is
    # self-assigned and reported on every streamed event's sessionID field.
    session_id_flags: []
    # Non-interactive continuation: opencode run --session <id> ... <prompt>.
    continue_id_flags:
      - "run"
      - "--model"
      - "{model}"
      - "--agent"
      - "handoff-safe"
      - "--format"
      - "json"
      - "--auto"
      - "--session"
      - "{session_id}"
      - "--dir"
      - "{cwd}"
      - "{prompt}"
    # Interactive reopen: `opencode run --session <id> --continue` (drops into TUI).
    resume_flags:
      - "--session"
      - "{session_id}"
      - "--continue"
